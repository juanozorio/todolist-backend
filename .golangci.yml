version: "2"

run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - bodyclose
    - noctx
    - gosec

linter-settings:
  goimports:
    local-prefixes: github.com/juanozorio/task-api
  revive:
    rules:
      - name: exported
        severity: warning
